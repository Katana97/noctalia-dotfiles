
$mod = SUPER

# 1. WINDOW MANAGEMENT
bind = $mod, Q, killactive #"Close Window"
bind = $mod+Shift+Alt, Q, exec, hyprctl kill #"Force Kill Window"
bind = $mod, F, fullscreen, 0 #"Fullscreen"
bind = $mod, D, fullscreen, 1 #"Maximise"
bind = $mod+Alt, F, fullscreenstate, 0 3 #"Fullscreen Spoof"
bind = $mod+Alt, Space, togglefloating #"Float / Tile"
bind = $mod, P, pin #"Pin Window"
bind = $mod, S, togglespecialworkspace #"Toggle Scratchpad"
bind = $mod+Alt, S, movetoworkspacesilent, special #"Send to Scratchpad"
bind = $mod, Semicolon, splitratio, -0.1 #"Decrease Split"
bind = $mod, Apostrophe, splitratio, +0.1 #"Increase Split"

# 2. NAVIGATION (FOCUS)
bind = $mod, Left, movefocus, l #"Focus Left"
bind = $mod, Right, movefocus, r #"Focus Right"
bind = $mod, Up, movefocus, u #"Focus Up"
bind = $mod, Down, movefocus, d #"Focus Down"
bind = $mod, BracketLeft, movefocus, l #"Focus Left (alt)"
bind = $mod, BracketRight, movefocus, r #"Focus Right (alt)"

# 3. MOVING WINDOWS
bind = $mod+Shift, Left, movewindow, l #"Move Left"
bind = $mod+Shift, Right, movewindow, r #"Move Right"
bind = $mod+Shift, Up, movewindow, u #"Move Up"
bind = $mod+Shift, Down, movewindow, d #"Move Down"
bindm = $mod, mouse:272, movewindow #"Move Window with Mouse"
bindm = $mod, mouse:273, resizewindow #"Resize Window with Mouse"

# 4. WORKSPACES
bind = $mod, 1, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 1 #"Workspace 1"
bind = $mod, 2, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 2 #"Workspace 2"
bind = $mod, 3, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 3 #"Workspace 3"
bind = $mod, 4, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 4 #"Workspace 4"
bind = $mod, 5, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 5 #"Workspace 5"
bind = $mod+Alt, 1, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 1 #"Send to Workspace 1"
bind = $mod+Alt, 2, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 2 #"Send to Workspace 2"
bind = $mod+Alt, 3, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 3 #"Send to Workspace 3"
bind = $mod+Alt, 4, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 4 #"Send to Workspace 4"
bind = $mod+Alt, 5, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 5 #"Send to Workspace 5"
bind = $mod, Page_Down, workspace, +1 #"Next Workspace"
bind = $mod, Page_Up, workspace, -1 #"Previous Workspace"
bind = $mod+Ctrl, Right, workspace, r+1 #"Next Workspace (Ctrl)"
bind = $mod+Ctrl, Left, workspace, r-1 #"Previous Workspace (Ctrl)"
bind = $mod+Shift, Page_Down, movetoworkspace, r+1 #"Move Window to Next Workspace"
bind = $mod+Shift, Page_Up, movetoworkspace, r-1 #"Move Window to Prev Workspace"

# 5. MULTIMEDIA AND BRIGHTNESS
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+ -l 1.5 #"Volume Up"
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%- #"Volume Down"
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle #"Mute"
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle #"Mute Mic"
bindl = , XF86AudioPlay, exec, playerctl play-pause #"Play / Pause"
bindl = , XF86AudioNext, exec, playerctl next #"Next Track"
bindl = , XF86AudioPrev, exec, playerctl previous #"Previous Track"
bindl = $mod+Shift, P, exec, playerctl play-pause #"Play / Pause"
bindl = $mod+Shift, N, exec, playerctl next #"Next Track"
bindl = $mod+Shift, B, exec, playerctl previous #"Previous Track"
bindle = , XF86MonBrightnessUp, exec, brightnessctl s 5%+ #"Brightness +"
bindle = , XF86MonBrightnessDown, exec, brightnessctl s 5%- #"Brightness -"

# 6. APPLICATIONS
bind = $mod, Return, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "${TERMINAL}" "kitty -1" "foot" "alacritty" #"Terminal"
bind = $mod, T, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "${TERMINAL}" "kitty -1" "foot" "alacritty" #"Terminal (alt)"
bind = $mod, W, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "google-chrome-stable" "zen-browser" "firefox" "brave" "chromium" #"Browser"
bind = $mod, E, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "dolphin" "nautilus" "nemo" "thunar" #"File Manager"
bind = $mod, C, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "code" "codium" "cursor" "kate" #"Code Editor"
bind = $mod, X, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "kate" "gnome-text-editor" #"Text Editor"
bind = $mod, M, exec, mailspring --password-store="gnome-libsecret" --ozone-platform-hint=x11 #"Mailspring"
bind = $mod, Y, exec, chromium --app=https://youtube.com --class=youtube-app #"YouTube"
bind = $mod+Alt, Y, exec, chromium --app=https://music.youtube.com --class=youtube-music-app #"YouTube Music"
bind = $mod+Shift, Y, exec, spotify #"Spotify"
bind = $mod+Shift, G, exec, kitty -e ~/.local/bin/egpu-detect.sh #"Detect eGPU"
bind = $mod, L, exec, qs -c noctalia-shell ipc call lockScreen lock #"Lock Screen"
bind = $mod+Shift, L, exec, systemctl suspend || loginctl suspend #"Suspend"

# 7. SCREENSHOTS AND RECORDING
bind = $mod+Shift, S, exec, hyprshot --freeze --clipboard-only --mode region --silent #"Screenshot Region to Clipboard"
bind = , Print, exec, grim - | wl-copy #"Screenshot to Clipboard"
bind = $mod+Shift, C, exec, hyprpicker -a #"Colour Picker"
bind = $mod+Shift, X, exec, grim -g "$(slurp)" /tmp/ocr.png && tesseract /tmp/ocr.png stdout | wl-copy && rm /tmp/ocr.png #"OCR Region to Clipboard"
bind = $mod+Shift, R, exec, ~/.config/quickshell/ii/scripts/videos/record.sh #"Record Region" #"Record Region"
bind = $mod+Shift+Alt, R, exec, ~/.config/quickshell/ii/scripts/videos/record.sh --fullscreen --sound #"Record Screen with Sound" #"Record Screen with Sound"

# 8. NOCTALIA SHELL
bind = $mod, Super_L, exec, qs -c noctalia-shell ipc call launcher toggle #"Launcher"
bind = $mod, Tab, hyprexpo:expo, toggle #"Workspace Overview"
bind = $mod, N, exec, qs -c noctalia-shell ipc call controlCenter toggle #"Right Sidebar"
bind = $mod, V, exec, qs -c noctalia-shell ipc call plugin:clipper toggle #"Clipboard History"
bind = $mod+Ctrl, T, exec, qs -c noctalia-shell ipc call wallpaper toggle #"Wallpaper Selector"
bind = $mod+Ctrl+Alt, T, exec, qs -c noctalia-shell ipc call wallpaper random #"Random Wallpaper"
bind = $mod+Ctrl, R, exec, killall qs quickshell; qs -c noctalia-shell & #"Restart Shell"
bind = $mod+Ctrl, Slash, exec, kitty -e micro ~/.config/hypr/custom/keybinds.conf #"Edit Keybinds"
bind = $mod, F1, exec, qs -c noctalia-shell ipc call plugin:keybind-cheatsheet toggle #"Keybinds Cheatsheet"
bind = $mod, Slash, exec, qs -c noctalia-shell ipc call plugin:keybind-cheatsheet toggle #"Keybinds Cheatsheet"
bind = $mod+Ctrl, D, exec, kitty -e bash ~/dotfiles/sync.sh #"Sync Dotfiles"
