# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# ######## Window rules ########

# Uncomment to apply global transparency to all windows:
# windowrule = opacity 0.89 override 0.89 override, match:class .*

# Disable blur for all xwayland apps
# windowrule = noblur, match:xwayland 1
# === WINDOW TRANSPARENCY ===
# Format: opacity [active] [inactive]

# Terminal - subtle transparency
windowrule = opacity 0.95 0.92, match:class kitty

# File manager - very subtle transparency
windowrule = opacity 0.98 0.95, match:class org.kde.dolphin

# Browser - almost fully opaque
windowrule = opacity 0.99 0.97, match:class firefox

# Code editor - fully opaque
windowrule = opacity 1.0 0.98, match:class code
windowrule = opacity 1.0 0.98, match:class Code

# General apps - very subtle transparency
windowrule = opacity 0.98 0.95, match:class .*
