# =============================================================================
# noctalia-apply.conf — Noctalia integration config
# Located at: ~/.config/noctalia/noctalia-apply.conf
# =============================================================================

# Enable or disable each module individually.
# Set to false to skip a module entirely (even if its deps are installed).

ENABLE_BORDERS=true
ENABLE_ICONS=true
ENABLE_CURSORS=true

# Cursor size applied via hyprctl setcursor.
# Override here to avoid editing noctalia-cursors.sh directly.
CURSOR_SIZE=32
